    <section class="application-section">
        <div class="container">
            <h2>Apply for a Job</h2>
            <form class="application-form" action="apply.php" method="post" enctype="multipart/form-data">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="applicantName">Full Name</label>
                        <input type="text" id="applicantName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="applicantEmail">Email Address</label>
                        <input type="email" id="applicantEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="applicantPhone">Phone Number</label>
                        <input type="tel" id="applicantPhone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="applicantCV">Upload CV</label>
                        <input type="file" id="applicantCV" name="cv" accept=".pdf,.doc,.docx" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="applicantMsg">Cover Letter / Message</label>
                        <textarea id="applicantMsg" name="message" rows="4"></textarea>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Submit Application</button>
            </form>
        </div>
    </section>
